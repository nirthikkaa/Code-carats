<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FOUNDLY</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1 class="brand">FOUNDLY</h1>
        <p class="tagline">You lost it, we found it</p>

        <button id="submitLostBtn" class="primary-btn">

        <p class="micro">

        </p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
